kind = "mobile"
previewPath = "/"
title = "SoruÇöz - Öğrenci & Öğretmen"
version = "1.0.0"
id = "artifacts/sorucozum"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22066

[services.development]
run = "pnpm --filter @workspace/sorucozum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sorucozum", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sorucozum", "run", "serve" ]

[services.env]
PORT = "22066"
BASE_PATH = "/"
